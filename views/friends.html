<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="friends-page">
<header>
<div class="navbar">
    <h1>mySchedule</h1>
    <a href="/main">Home</a>
    <a class="active" href="/friends">Friends</a>
    <a href="/schedule">Schedule</a>
    <a href="/login" class="signin-btn" id="authButton">Sign In</a>
</div>
</header>

<div class="friends-layout">
    <!-- LEFT SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-top">
            <button class="friends-btn active" onclick="selectTab('all')">Friends</button>
        </div>

        <div class="dm-section">
            <h4>Direct Messages</h4>
            <div id="dmList"></div>
        </div>
    </div>

    <!-- RIGHT CONTENT AREA -->
    <div class="content">
        <!-- TOP TABS -->
        <div class="friends-tabs">
            <button onclick="selectTab('online')">Online</button>
            <button onclick="selectTab('all')">All</button>
            <button onclick="selectTab('pending')">Pending</button>
            <button onclick="selectTab('add')">Add Friend</button>

        </div>
        <h1>Find Friends</h1>

        <!-- MAIN PANEL -->
        <input type="text" id="searchInput" placeholder="Search username">
        <button onclick="searchUsers()">Search</button>

        <div id="results"></div>
        <div id="friendsContent" class="friends-content"></div>
    </div>
</div>

<script src="js/friends.js"></script>

</body>
</html>
