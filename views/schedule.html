<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="friends-page">
<header>
<div class="navbar">
    <h1>mySchedule</h1>
    <a href="/index">Home</a>
    <a href="/friends">Friends</a>
    <a class="active" href="/schedule">Schedule</a>
    <a href="/login" class="signin-btn" id="authButton">Sign In</a>
</div>
</header>

<div class="schedule-page">

    <div class="sidebar">
        <div class="sidebar-top">
            <div class="calendar-header"></div>
            <button id="openModal" class="open-modal"><span class="plus">+</span> Create</button>
        </div>
    </div>

    <div id="eventModal" class="modal-hidden hidden">
        <div class="modal-content" id="modalContent">
            <span id="closeModal" class="close-modal">&times;</span>
            <h2>Create Event</h2>
            
            <input type="text" id="title" placeholder="Title" required>
            <input type="datetime-local" id="start" required>
            <input type="datetime-local" id="end" required>
            <input type="color" id="color">

            <select id="recurrence">
                <option value="none">One-time</option>
                <option value="weekly">Weekly</option>
            </select>

            <select id="visibility">
                <option value="private">Private</option>
                <option value="friends">Friends</option>
            </select>

            <button id="submitEvent">Create</button>
        </div>
    </div>

    <div class="content">
        <div id="calendar"></div>
    </div>
</div>

<script src="js/schedule.js"></script>

</body>
</html>
